<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ລະບົບເຊັກອິນ - ຕິດຕັ້ງ</title>

  <link rel="manifest" href="./manifest.json">

  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2e9a57">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Phetsarath OT', Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }
    .icon-preview {
      width: 80px;
      height: 80px;
      border-radius: 15px;
      margin-bottom: 15px;
    }
    .btn {
      background: #2e9a57;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 25px;
      font-weight: bold;
      width: 100%;
      display: none;
    }
    .ios-instruction {
      display: none;
      margin-top: 15px;
      font-size: 14px;
      background: #f6f6f6;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="container" id="mainContent">
    <img src="./icon-192.png" class="icon-preview">
    <h2>ລະບົບເຊັກອິນ</h2>
    <p id="statusText">ກະລຸນາຕິດຕັ້ງແອັບ</p>

    <button id="installBtn" class="btn">📲 ຕິດຕັ້ງແອັບ</button>

    <div id="iosPrompt" class="ios-instruction">
      iPhone: Share → Add to Home Screen
    </div>
  </div>

<script>
function isRunningStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
}
if (isRunningStandalone()) {
  location.href = 'https://lssomain.laotel.com/Authentication';
}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}

let deferredPrompt;
const btn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btn.style.display = 'block';
});

btn.onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
};

const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
if (isIos && !isRunningStandalone()) {
  document.getElementById('iosPrompt').style.display = 'block';
}
</script>

</body>
</html>
