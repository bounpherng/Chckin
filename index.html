<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ລະບົບຕິດຕາມການເຊັກອິນ – ຫ້ອງການປະກັນສັງຄົມ</title>
  <meta name="theme-color" content="#0d3320">
  
  <link rel="manifest" href="/Checkin/manifest.json" />
  
  <!-- ກຳນົດໄອຄອນສຳລັບເວັບບຣາວເຊີທົ່ວໄປ -->
  <link rel="icon" type="image/png" sizes="192x192" href="/Checkin/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/Checkin/icon-512.png" />
  
  <!-- ກຳນົດໄອຄອນສຳລັບລະບົບ iOS (Apple) -->
  <link rel="apple-touch-icon" sizes="192x192" href="/Checkin/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/Checkin/icon-512.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --g1: #071a0e;
      --g2: #0d2b18;
      --g3: #0d3320;
      --g4: #145228;
      --g5: #1a6b34;
      --g-mid:   #2da653;
      --g-light: #4dc97a;
      --gold:      #cca752;
      --gold-light:#e8d399;
      --white: #ffffff;
      --cream: #edfaf3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: 'Noto Sans Lao', sans-serif;
      background: var(--g1);
      color: var(--cream);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== BACKGROUND ===== */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg-img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
    }
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg,
        rgba(7,26,14,0.88) 0%,
        rgba(13,51,32,0.78) 45%,
        rgba(7,26,14,0.95) 100%);
    }
    .bg-sweep {
      position: absolute;
      inset: 0;
      background: linear-gradient(130deg,
        transparent 25%,
        rgba(45,166,83,0.07) 50%,
        transparent 75%);
      animation: sweep 9s ease-in-out infinite alternate;
    }
    @keyframes sweep {
      from { transform: translateX(-8%) skewX(-4deg); }
      to   { transform: translateX(8%)  skewX(4deg); }
    }
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .bg-c1 {
      width: 60vw; height: 60vw;
      top: -12vw; left: -12vw;
      background: radial-gradient(circle, rgba(34,136,63,0.16), transparent 70%);
    }
    .bg-c2 {
      width: 50vw; height: 50vw;
      bottom: -6vw; right: -8vw;
      background: radial-gradient(circle, rgba(20,82,40,0.2), transparent 70%);
    }

    /* ===== WAVE CANVAS ===== */
    .wave-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ===== PARTICLES ===== */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .pt {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, var(--g-light), var(--g-mid));
      opacity: 0;
      animation: ptFloat var(--dur) var(--del) ease-in infinite;
    }
    @keyframes ptFloat {
      0%   { transform: translateY(105vh) scale(0.2); opacity: 0; }
      15%  { opacity: 0.7; }
      85%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(2); opacity: 0; }
    }

    /* ===== PAGE WRAPPER ===== */
    .page {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px env(safe-area-inset-bottom, 24px);
    }

    /* ===== CARD ===== */
    .card {
      width: 100%;
      background: rgba(10,34,20,0.78);
      border: 1px solid rgba(45,166,83,0.22);
      border-radius: 26px;
      overflow: hidden;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow:
        0 0 0 1px rgba(45,166,83,0.08),
        0 28px 65px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(77,201,122,0.12);
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.1s both;
    }

    /* ===== IMAGE ZONE ===== */
    .img-zone {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }
    .img-zone img.bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transition: transform 10s ease;
      filter: brightness(0.88) saturate(1.15);
    }
    .card:hover .img-zone img.bg { transform: scale(1.03); }

    .img-zone::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(7,26,14,0.0) 0%, rgba(7,26,14,0.0) 50%, rgba(7,26,14,0.72) 100%);
    }
    .img-zone::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(45,166,83,0.18);
      border-radius: 6px;
      z-index: 5;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 22px; height: 22px;
      border-color: var(--g-light);
      border-style: solid;
      z-index: 6;
      opacity: 0.6;
    }
    .corner.tl { top:6px; left:6px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
    .corner.tr { top:6px; right:6px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
    .corner.bl { bottom:6px; left:6px; border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
    .corner.br { bottom:6px; right:6px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

    /* ===== CARD BODY ===== */
    .card-body {
      padding: 24px 24px 28px;
      text-align: center;
    }

    .org-label {
      font-size: 10.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--g-mid);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card-lao-title {
      font-size: clamp(18px, 5.2vw, 22px);
      font-weight: 800;
      color: var(--cream);
      text-shadow: 0 0 30px rgba(77,201,122,0.2);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px auto 24px auto;
      width: 72%;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--g5), transparent);
    }
    .divider-gem {
      width: 6px; height: 6px;
      background: var(--g-mid);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--g-light);
      flex-shrink: 0;
    }

    .card-sub {
      font-size: clamp(12px, 3.2vw, 13.5px);
      color: rgba(237,250,243,0.48);
      margin-bottom: 24px;
      letter-spacing: 0.03em;
    }

    /* ===== BUTTONS ===== */
    .btn-green {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: clamp(14px, 4vw, 16px);
      font-weight: 700;
      color: var(--white);
      background: linear-gradient(135deg,
        #3dd68c 0%,
        #22883f 38%,
        #145228 72%,
        #0d3320 100%);
      box-shadow:
        0 0 0 1px rgba(45,166,83,0.35),
        0 8px 24px rgba(20,82,40,0.5),
        inset 0 1px 0 rgba(77,201,122,0.35);
      transition: all 0.35s cubic-bezier(.25,.8,.25,1);
      margin-bottom: 12px;
      overflow: hidden;
      letter-spacing: 0.03em;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-green::before {
      content: '';
      position: absolute;
      top: 0; left: -110%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      transform: skewX(-20deg);
      transition: left 0.65s ease;
    }
    .btn-green:hover::before { left: 160%; }
    .btn-green:hover {
      transform: translateY(-3px);
      box-shadow:
        0 0 0 1px rgba(77,201,122,0.45),
        0 14px 32px rgba(20,82,40,0.6),
        inset 0 1px 0 rgba(77,201,122,0.5);
    }
    .btn-green:active { transform: translateY(1px); }
    
    .btn-icon {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
    }

    .btn-outline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border: 1px solid rgba(45,166,83,0.3);
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: clamp(13px, 3.5vw, 15px);
      font-weight: 600;
      color: var(--g-light);
      background: rgba(45,166,83,0.06);
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-outline:hover {
      background: rgba(45,166,83,0.12);
      border-color: rgba(77,201,122,0.5);
      transform: translateY(-2px);
    }
    
    .btn-outline svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
    }

    /* ===== UPDATE BANNER ===== */
    #update-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #145228, #22883f);
      color: #fff;
      text-align: center;
      padding: 12px 16px;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      cursor: pointer;
      animation: slideDown 0.4s ease;
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to   { transform: translateY(0); }
    }
    #update-banner:hover { background: linear-gradient(135deg, #1a6b34, #3dd68c); }

    /* ===== FOOTER ===== */
    footer {
      margin-top: 26px;
      text-align: center;
      line-height: 1.9;
      animation: fadeUp 1s ease 0.4s both;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    footer .line1 {
      font-size: 11px;
      color: rgba(45,166,83,0.48);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    footer .line2 {
      font-size: 12.5px;
      color: rgba(237,250,243,0.36);
    }
    footer .line2 strong { color: var(--g-light); font-weight: 700; }
    footer a { color: var(--gold); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--gold-light); }

    /* ===== COUNTDOWN RING ===== */
    .countdown-wrap {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 8px auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ring-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(77,201,122,0.18) 0%, transparent 72%);
      animation: ringPulse 1.8s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%,100% { transform: scale(0.92); opacity: 0.5; }
      50%      { transform: scale(1.08); opacity: 1; }
    }
    .ring-svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      transform: rotate(-90deg);
      overflow: visible;
    }
    .ring-deco {
      fill: none;
      stroke: rgba(45,166,83,0.12);
      stroke-width: 1;
      stroke-dasharray: 4 8;
      animation: spinDeco 12s linear infinite;
      transform-origin: 60px 60px;
    }
    @keyframes spinDeco { to { transform: rotate(360deg); } }
    .ring-dots {
      fill: none;
      stroke: rgba(204,167,82,0.3);
      stroke-width: 1.5;
      stroke-dasharray: 1 14;
      animation: spinDots 8s linear infinite reverse;
      transform-origin: 60px 60px;
    }
    @keyframes spinDots { to { transform: rotate(360deg); } }
    .ring-track {
      fill: none;
      stroke: rgba(45,166,83,0.12);
      stroke-width: 7;
      stroke-linecap: round;
    }
    .ring-progress {
      fill: none;
      stroke-width: 7;
      stroke-linecap: round;
      stroke: rgba(77,201,122,1);
      stroke-dasharray: 289.03;
      stroke-dashoffset: 0;
      filter: drop-shadow(0 0 8px rgba(77,201,122,0.8)) drop-shadow(0 0 2px rgba(204,167,82,0.5));
      transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
    }
    .ring-inner {
      fill: none;
      stroke: rgba(77,201,122,0.06);
      stroke-width: 10;
    }
    .countdown-center {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .countdown-num {
      font-size: 42px;
      font-weight: 800;
      color: var(--white);
      text-shadow: 0 0 20px rgba(77,201,122,0.9), 0 0 40px rgba(77,201,122,0.4);
      line-height: 1;
      animation: numPop 1s ease-in-out infinite;
    }
    @keyframes numPop {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.1); }
    }
    .countdown-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--g-mid);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .redirect-hint {
      font-size: 11.5px;
      color: rgba(77,201,122,0.5);
      letter-spacing: 0.06em;
      margin-bottom: 18px;
      animation: blinkHint 1.6s ease-in-out infinite;
    }
    @keyframes blinkHint {
      0%,100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(32px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-height: 650px) {
      .img-zone { aspect-ratio: 4 / 3; }
      .card-body { padding: 18px 20px 20px; }
      footer { margin-top: 16px; }
    }
    @media (max-width: 360px) {
      .page { padding: 14px 12px; }
      .card-body { padding: 48px 16px 22px; }
    }
  </style>
</head>
<body>

<!-- 🔔 UPDATE BANNER — ສະແດງອັດຕະໂນມັດເມື່ອມີ version ໃໝ່ -->
<div id="update-banner" onclick="applyUpdate()">
  🔄 ມີການອັບເດດໃໝ່! ກົດທີ່ນີ້ເພື່ອໂຫຼດໃໝ່
</div>

<!-- BACKGROUND -->
<div class="bg-layer">
  <!-- ◄ ປ່ຽນ ?v=3 ທຸກຄັ້ງທີ່ update logo ໃໝ່ ເພື່ອ bypass cache -->
  <img class="bg-img" src="https://raw.githubusercontent.com/bounpherng/Checkin/main/logo.png?v=3" alt="">
  <div class="bg-overlay"></div>
  <div class="bg-sweep"></div>
  <div class="bg-circle bg-c1"></div>
  <div class="bg-circle bg-c2"></div>
</div>

<canvas class="wave-canvas" id="waveCanvas"></canvas>
<div class="particles" id="particles"></div>

<div class="page">

  <div class="card">
    <!-- IMAGE -->
    <div class="img-zone">
      <!-- ◄ ປ່ຽນ ?v=3 ທຸກຄັ້ງທີ່ update logo ໃໝ່ -->
      <img class="bg"
           src="https://raw.githubusercontent.com/bounpherng/Checkin/main/logo.png?v=3"
           alt="ກອງປະກັນສັງຄົມ">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

    <!-- BODY -->
    <div class="card-body">
      <p class="org-label">Social Security Office</p>
      <h1 class="card-lao-title">ຫ້ອງການປະກັນສັງຄົມ</h1>

      <div class="divider"><div class="divider-gem"></div></div>

      <p class="card-sub">ລະບົບຕິດຕາມການເຂົ້າ-ອອກ ຫ້ອງການ</p>

      <!-- COUNTDOWN RING -->
      <div class="countdown-wrap">
        <div class="ring-glow"></div>
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="56" class="ring-deco"/>
          <circle cx="60" cy="60" r="56" class="ring-dots" id="ringDots"/>
          <circle cx="60" cy="60" r="46" class="ring-track"/>
          <circle cx="60" cy="60" r="46" class="ring-progress" id="ringProgress"/>
          <circle cx="60" cy="60" r="36" class="ring-inner"/>
        </svg>
        <div class="countdown-center">
          <span class="countdown-num" id="countNum">5</span>
          <span class="countdown-label">ວິນາທີ</span>
        </div>
      </div>
      <p class="redirect-hint">ກຳລັງໂອນໄປສູ່ລະບົບ...</p>

      <button class="btn-outline" id="installApp" style="display:none">
        <svg viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="2" width="14" height="20" rx="2"/>
          <line x1="12" y1="18" x2="12" y2="18"/>
        </svg>
        ຕິດຕັ້ງແອັບໃສ່ໂທລະສັບ
      </button>

    </div>
  </div>

  <footer>
    <div class="line1">© <span id="year"></span> ສ້າງຫນ້າຫຼັກເພື່ອເປີດຫຼິງລະບົບເຊັກອິນ ຫປສ ໂດຍ :</div>
    <div class="line2">
      <strong>ທ.ບຸນເຜີ້ງ ເພັດໄຊຍະພູມ</strong> &nbsp;|&nbsp;
      <a href="https://bounpherng.github.io/itbanban/" target="_blank">ເຄື່ອງຄຳນວນເງີນອຸດໜຸນ</a>
    </div>
  </footer>

</div>

<script>
  // ===================================================
  // ຕົວແປ: ເກັບ registration ຂອງ SW ໃໝ່ທີ່ລໍຖ້ານຳໃຊ້
  // ===================================================
  let newWorker = null;

  function applyUpdate() {
    if (newWorker) {
      // ສົ່ງຄຳສັ່ງໃຫ້ SW ໃໝ່ activate ທັນທີ
      newWorker.postMessage({ type: 'SKIP_WAITING' });
    } else {
      // ຖ້າບໍ່ມີ Service Worker ແຕ່ກົດອັບເດດ ໃຫ້ Force Reload ໜ້າເວັບ
      window.location.reload(true);
    }
  }

  // ===================================================
  // SERVICE WORKER REGISTRATION + AUTO-UPDATE DETECTION
  // ===================================================
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/Checkin/service-worker.js')
        .then(reg => {
          console.log('[App] SW registered, scope:', reg.scope);

          // ກວດສອບ update ທຸກ 60 ວິນາທີ
          setInterval(() => {
             reg.update();
             console.log('[App] Checking for updates...');
          }, 60 * 1000);

          // ຮັບຮູ້ເມື່ອ SW ໃໝ່ກຳລັງ install
          reg.addEventListener('updatefound', () => {
            newWorker = reg.installing;
            console.log('[App] New SW found, installing...');

            newWorker.addEventListener('statechange', () => {
              // SW ໃໝ່ install ສຳເລັດ ແລະ ລໍຖ້ານຳໃຊ້
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[App] Update ready! Showing banner...');
                document.getElementById('update-banner').style.display = 'block';
              }
            });
          });
        })
        .catch(err => console.error('[App] SW registration failed:', err));

      // ເມື່ອ SW ໃໝ່ activate ແລ້ວ — reload ໜ້າໂດຍອັດຕະໂນມັດ
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          console.log('[App] Controller changed, reloading...');
          window.location.reload();
        }
      });
    });
  }

  // ===================================================
  // UI LOGIC & COUNTDOWN
  // ===================================================
  document.getElementById('year').textContent = new Date().getFullYear();

  const targetUrl = 'https://lssomain.laotel.com/Authentication';
  const TOTAL = 5;
  let timeLeft = TOTAL;

  const ringProgress = document.getElementById('ringProgress');
  const countNum    = document.getElementById('countNum');
  const CIRCUMFERENCE = 2 * Math.PI * 46; // r=46 => ~289.03

  function setRing(remaining) {
    const fraction = remaining / TOTAL;
    const offset   = CIRCUMFERENCE * (1 - fraction);
    ringProgress.style.strokeDashoffset = offset;
    countNum.textContent = remaining;
    // colour shift gold on last 2 secs
    if (remaining <= 2) {
      ringProgress.style.stroke = '#e8d399';
      ringProgress.style.filter = 'drop-shadow(0 0 10px rgba(232,211,153,0.9))';
      countNum.style.textShadow = '0 0 20px rgba(232,211,153,0.9), 0 0 40px rgba(204,167,82,0.5)';
    }
  }

  // initialise ring at full
  setRing(TOTAL);

  function openLink() { window.location.href = targetUrl; }

  const timer = setInterval(() => {
    timeLeft--;
    setRing(timeLeft);
    if (timeLeft <= 0) {
      clearInterval(timer);
      setTimeout(openLink, 400);
    }
  }, 1000);

  let deferredPrompt;
  const installBtn = document.getElementById('installApp');
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'flex';
  });
  installBtn.addEventListener('click', async () => {
    installBtn.style.display = 'none';
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
  });

  // ===================================================
  // PARTICLES
  // ===================================================
  const ptCon = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    const sz = 2 + Math.random() * 3.5;
    p.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz}px;--dur:${11+Math.random()*13}s;--del:${Math.random()*13}s;`;
    ptCon.appendChild(p);
  }

  // ===================================================
  // GREEN WAVE
  // ===================================================
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, t = 0;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  function drawWaves() {
    ctx.clearRect(0, 0, W, H);
    [
      { y: H*.60, amp: 36, freq: .008, speed: .011, alpha: .20, lw: 2.0 },
      { y: H*.65, amp: 24, freq: .012, speed: .017, alpha: .12, lw: 1.3 },
      { y: H*.57, amp: 48, freq: .006, speed: .007, alpha: .07, lw: 2.8 },
    ].forEach(w => {
      const g = ctx.createLinearGradient(0,0,W,0);
      g.addColorStop(0,   `rgba(45,166,83,0)`);
      g.addColorStop(.2,  `rgba(45,166,83,${w.alpha})`);
      g.addColorStop(.5,  `rgba(77,201,122,${w.alpha*1.5})`);
      g.addColorStop(.8,  `rgba(45,166,83,${w.alpha})`);
      g.addColorStop(1,   `rgba(45,166,83,0)`);
      ctx.beginPath(); ctx.moveTo(0, w.y);
      for (let x = 0; x <= W; x += 3) {
        ctx.lineTo(x, w.y
          + Math.sin(x*w.freq + t*w.speed*60)*w.amp
          + Math.sin(x*w.freq*1.6 + t*w.speed*38)*(w.amp*.38));
      }
      ctx.strokeStyle = g; ctx.lineWidth = w.lw;
      ctx.shadowColor = 'rgba(45,166,83,0.4)'; ctx.shadowBlur = 7;
      ctx.stroke(); ctx.shadowBlur = 0;
    });
    t++; requestAnimationFrame(drawWaves);
  }
  drawWaves();
</script>
</body>
</html>
